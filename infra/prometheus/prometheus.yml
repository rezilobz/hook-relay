global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # HookRelay API — ingestion counters, DLQ gauge changes from replay/delete.
  - job_name: hookrelay-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics/
    scrape_interval: 5s

  # HookRelay worker — delivery counters, latency, retry depth, DLQ gauge, Kafka lag.
  # The worker exposes a lightweight prometheus_client HTTP server on port 8001.
  - job_name: hookrelay-worker
    static_configs:
      - targets: ["worker:8001"]
    scrape_interval: 5s
